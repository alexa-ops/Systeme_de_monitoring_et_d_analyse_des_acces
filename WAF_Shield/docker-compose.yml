services:
  web:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 configuration.asgi:application
    volumes:
      - .:/application
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: "<SECRET>"
      DJANGO_DEBUG: "1"
      DB_NAME: "waf_shield"
      DB_USER: "waf_user"
      DB_PASSWORD: "waf_password"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      REDIS_URL: "redis://redis:6379/1"
      EMAIL_HOST: "mailhog"
      EMAIL_PORT: "1025"
      EMAIL_HOST_USER: ""
      EMAIL_HOST_PASSWORD: ""
      EMAIL_USE_TLS: "0"
      EMAIL_FROM: "waf-shield@local.test"
    depends_on:
      - postgres
      - redis
      - mailhog

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: waf_shield
      POSTGRES_USER: waf_user
      POSTGRES_PASSWORD: waf_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"

volumes:
  postgres_data:
